<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Virtual Bookstore</title>
  <style>
    /* --- Base styles --- */
    * {
		  box-sizing: border-box;
		  font-family: "Poppins", sans-serif;
		   }
		   body {
		     margin: 0;
		     background: linear-gradient(135deg, #f7f7f7, #e6e9f0);
		     color: #333;
		     display: flex;
		     flex-direction: column;
		     min-height: 100vh;
		   }

		   /* --- Topbar --- */
		   .topbar {
			background: linear-gradient(90deg, #4a148c, #7b1fa2);
					 color: #fff;
					 padding: 14px 28px;
					 display: flex;
					 align-items: center;
					 justify-content: space-between;
					 box-shadow: 0 2px 5px rgba(0,0,0,0.15);
					 position: sticky;
					 top: 0;
					 z-index: 100;
		   }
		   .brand a {
		     text-decoration: none;
		     color: #fff;
		     font-weight: 600;
		     font-size: 1.2rem;
		   }
		   .brand a:hover {
		     color: #ffde59;
		   }

		   /* --- Main Container --- */
		   .container {
		     flex: 1;
		     display: flex;
		     align-items: center;
		     justify-content: center;
		     padding: 2rem;
		   }

    /* --- Card container --- */
    .auth-container {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 380px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .auth-container:hover {
      transform: translateY(-4px);
    }

    .auth-container h2 {
      margin-bottom: 1.5rem;
      color: #4a148c;
      font-weight: 600;
    }

    /* --- Input fields --- */
    .auth-input {
      width: 100%;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .auth-input:focus {
      border-color: #4a148c;
      box-shadow: 0 0 5px rgba(74, 20, 140, 0.3);
      outline: none;
    }

    /* --- Button --- */
    .auth-btn {
      width: 100%;
      background: #4a148c;
      color: #fff;
      padding: 0.9rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .auth-btn:hover {
      background: #6a1b9a;
      transform: scale(1.03);
    }

    /* --- Switch link --- */
    .switch-link {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .switch-link a {
      color: #4a148c;
      text-decoration: none;
      font-weight: 500;
    }

    .switch-link a:hover {
      text-decoration: underline;
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      .auth-container {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
	<header class="topbar">
	   <div class="brand"><a href="/">📚 Virtual Bookstore</a></div>
	 </header>
	 
 <main class="container">
  <div class="auth-container">
    <h2>Login</h2>
    <form id="loginForm" method="POST">
      <input type="text" id="username" name="username" class="auth-input" placeholder="Email or Username" required />
      <input type="password" id="password" name="password" class="auth-input" placeholder="Password" required />
      <button type="submit" class="auth-btn">Login</button>
    </form>
    <div class="switch-link">
      Don’t have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
  </main>
  <script>
    const API_BASE = "http://localhost:8080"; // Example backend

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      try {
        const res = await fetch(`${API_BASE}/users/login`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email, password })
        });

        const token = await res.text();
		if(res.ok){
			localStorage.setItem("vb_token",token);            
			localStorage.setItem("vb_email",email)
			location.href = "/index.html";
			alert("Login Success");
		}else{
			alert(token);
		}
      } catch (err) {
        alert('Login error: ' + err.message);
      }
    });
	/*if (text.toLowerCase().includes('success')) {
	          localStorage.setItem('vb_user', username);
	          location.href = '/';
	        }*/
  </script>
</body>
</html>
