<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your Cart</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/">📚 Virtual Bookstore</a></div>
    <div class="actions">
      <span id="userEmail"></span>
      <a href="/login.html" id="loginLink">Login</a>
      <a href="/signup.html" id="signupLink">Signup</a>
      <a href="#" id="logoutLink" style="display:none;">Logout</a>
      <a href="/cart.html" class="cart-link">🛒 Cart (<span id="cartCount">0</span>)</a>
    </div>
  </header>

  <main class="container">
    <h2>Your Shopping Cart</h2>
    <div id="cartItems"></div>
    <div id="cartSummary" class="cart-summary"></div>
  </main>

  <script src="/script.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById("cartItems");
      const summary = document.getElementById("cartSummary");

      if (!cart.length) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        summary.innerHTML = "";
        return;
      }

      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div>
            <strong>${escapeHtml(item.title)}</strong><br/>
            ₹${item.price.toFixed(2)}
          </div>
          <div>
            <input type="number" min="1" value="${item.qty}" onchange="updateQty(${item.id}, this.value)">
            <button onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      `).join("");

      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      summary.innerHTML = `
        <p><strong>Total:</strong> ₹${total.toFixed(2)}</p>
        <button class="primary" onclick="checkoutCart()">Checkout</button>
        <button class="secondary" onclick="clearCart(); renderCart(); loadCartCount();">Clear Cart</button>
      `;
    }

    async function checkoutCart() {
      if (!isLoggedIn()) {
        alert("Please login to complete your purchase.");
        location.href = "/login.html";
        return;
      }

      const cart = getCart();
      if (!cart.length) {
        alert("Cart is empty!");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/books/checkout`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify({items: cart})
        });

        const msg = await res.text().catch(() => res.statusText);
        if (res.ok) {
          alert(msg || "Checkout successful!");
          clearCart();
          renderCart();
          await loadCartCount();
        } else {
          alert(msg || "Checkout failed!");
        }
      } catch (err) {
        console.error("Checkout error:", err);
        alert("Something went wrong during checkout.");
      }
    }

    updateAuthUI();
    renderCart();
    loadCartCount();
  </script>
</body>
</html>
