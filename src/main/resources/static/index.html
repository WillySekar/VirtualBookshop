<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Virtual Bookstore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">

</head>
<body>
  <header>
    <div>
      <a href="/index.html" style="font-weight:bold;">📚 Virtual Bookstore</a>
      <span id="userEmail"></span>
	  <a href="/orders.html">📦 My Orders</a>
    </div>
    <div>
      <input id="searchInput" placeholder="Search books..." />
      <a id="loginLink" href="/login.html">Login</a>
      <a id="signupLink" href="/signup.html">Signup</a>
	  <a href="#" id="darkToggle">🌙 Dark Mode</a>
      <a id="logoutLink" href="#" style="display:none;">Logout</a>
      <a href="/cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
    </div>
  </header>
  <section class="hero">
     <div class="hero-content">
       <h1>Welcome to Virtual Bookstore</h1>
       <p>Discover thousands of books at your fingertips — from timeless classics to trending titles.</p>
       <button onclick="location.href='/cart.html'" class="hero-btn">View Your Cart</button>
     </div>
     <div class="hero-image">
     <img src="/images/book.png" alt="Bookshelf">
     </div>
   </section>
   
  <main>
	<h2 class="section-title">Available Books</h2>
    <div id="booksGrid"></div>
  </main>

  <script src="/script.js"></script>
  <script>
    // ---------------- AUTH & UI CONTROL ----------------
    function updateAuthUI() {
      const token = localStorage.getItem("vb_token");
      const email = localStorage.getItem("vb_email");

      const loginLink = document.getElementById("loginLink");
      const signupLink = document.getElementById("signupLink");
      const logoutLink = document.getElementById("logoutLink");
      const userEmail = document.getElementById("userEmail");

      if (token) {
        loginLink.style.display = "none";
        signupLink.style.display = "none";
        logoutLink.style.display = "inline";
        userEmail.textContent = `Hi, ${email}`;
      } else {
        loginLink.style.display = "inline";
        signupLink.style.display = "inline";
        logoutLink.style.display = "none";
        userEmail.textContent = "";
      }

      logoutLink.onclick = (e) => {
        e.preventDefault();
        localStorage.removeItem("vb_token");
        localStorage.removeItem("vb_email");
        alert("You have logged out!");
        updateAuthUI();
        location.href = "/login.html";
      };
    }

    // Protect Add to Cart & Details
    function handleProtectedAction(action) {
      const token = localStorage.getItem("vb_token");
      if (!token) {
        alert("Please login to continue");
        location.href = "/login.html";
        return false;
      }
      action();
    }

    // Override displayBooks to protect actions
    const oldDisplayBooks = displayBooks;
    displayBooks = function(list) {
      const grid = document.getElementById('booksGrid');
      if (!grid) return;
      booksCache = list;
      grid.innerHTML = list.map(b => `
        <div class="card">
          <div>
            <h3>${escapeHtml(b.title)}</h3>
            <div class="muted">by ${escapeHtml(b.author)}</div>
            <div class="price">₹${(+b.price).toFixed(2)}</div>
            <div class="muted">In stock: ${b.quantity ?? '—'}</div>
          </div>
          <div class="actions">
            <a class="secondary" href="#" onclick="handleProtectedAction(()=>location.href='/book.html?id=${b.id}')">Details</a>
            <button class="primary" onclick="handleProtectedAction(()=>addToCart(${b.id}))" ${b.quantity === 0 ? 'disabled' : ''}>Add to Cart</button>
          </div>
        </div>
      `).join('');
    }

    // Init page
    async function init() {
      updateAuthUI();
      await loadCartCount();
      await loadBooks();
      document.getElementById('searchInput').addEventListener('input', (e) => {
        filterBooks(e.target.value.trim().toLowerCase());
      });
    }
	//Dark Mode toggle button
	const toggle = document.getElementById("darkToggle");
	  const body = document.body;

	  // Load saved theme
	  if (localStorage.getItem("theme") === "dark") {
	    body.classList.add("dark");
	    toggle.textContent = "☀️ Light Mode";
	  }

	  toggle.addEventListener("click", () => {
	    body.classList.toggle("dark");
	    const isDark = body.classList.contains("dark");
	    toggle.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
	    localStorage.setItem("theme", isDark ? "dark" : "light");
	  });
	  
    init();
  </script>
</body>
</html>
